<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小灯助手 - 数据注入</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 380px; margin: 40px auto; padding: 20px; background: #fff3f8; color: #785060; }
  .card { background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 2px 12px rgba(200,140,170,0.07); text-align: center; }
  h2 { color: #c9708a; margin-bottom: 16px; }
  .info { font-size: 13px; color: #b898a8; margin: 12px 0; line-height: 1.8; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin: 8px 0; font-family: inherit; }
  .btn-pink { background: linear-gradient(135deg, #f0a8be, #db7093); color: #fff; box-shadow: 0 3px 12px rgba(219,112,147,0.25); }
  .btn-outline { background: #fff; color: #db7093; border: 1.5px solid #f0d4de; }
  .success { color: #80a898; font-weight: 600; }
  .error { color: #d89098; }
  textarea { width: 100%; height: 200px; border: 1.5px solid #f0d4de; border-radius: 12px; padding: 12px; font-size: 12px; font-family: monospace; background: #fefafc; color: #785060; resize: vertical; }
</style>
</head>
<body>
<div class="card">
  <h2>💡 小灯助手</h2>
  <p class="info">此页面与小灯记账共享数据库<br>可以批量导入交易记录</p>

  <textarea id="data" placeholder="JSON 格式的交易数据">[
  {
    "amount": 30,
    "category": "transport",
    "note": "打车",
    "date": "2026-05-28"
  },
  {
    "amount": 9.9,
    "category": "food",
    "note": "喝咖啡",
    "date": "2026-05-28"
  }
]</textarea>

  <button class="btn btn-pink" onclick="importData()">💡 导入</button>
  <button class="btn btn-outline" onclick="viewData()">📋 查看已有记录</button>
  <div id="result"></div>
</div>

<script>
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('xiaodeng', 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('tx')) db.createObjectStore('tx', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function importData() {
  const r = document.getElementById('result');
  try {
    const raw = document.getElementById('data').value.trim();
    if (!raw) { r.innerHTML = '<p class="error">请输入数据喵~</p>'; return; }
    const records = JSON.parse(raw);
    if (!Array.isArray(records)) { r.innerHTML = '<p class="error">数据必须是数组格式喵~</p>'; return; }

    const db = await openDB();

    // Check existing records for duplicates
    const existing = await new Promise((resolve) => {
      const t = db.transaction('tx','readonly');
      const req = t.objectStore('tx').getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });

    let count = 0;
    let skipped = 0;
    for (const rec of records) {
      if (!rec.amount || !rec.category || !rec.date) continue;

      // Skip duplicate
      const isDup = existing.some(e =>
        e.date === rec.date && e.amount === parseFloat(rec.amount) && e.note === (rec.note || '')
      );
      if (isDup) { skipped++; continue; }

      const tx = {
        id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2),
        amount: parseFloat(rec.amount),
        category: rec.category,
        note: rec.note || '',
        date: rec.date,
        createdAt: Date.now()
      };
      await new Promise((resolve, reject) => {
        const t = db.transaction('tx','readwrite');
        const req = t.objectStore('tx').put(tx);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
      count++;
    }
    db.close();
    r.innerHTML = '<p class="success">导入成功！新增 ' + count + ' 条' + (skipped > 0 ? '，跳过 ' + skipped + ' 条重复' : '') + ' 喵~<br>打开小灯记账就能看到了 🎉</p>';
  } catch(e) {
    r.innerHTML = '<p class="error">出错了喵：' + e.message + '</p>';
  }
}

async function viewData() {
  const r = document.getElementById('result');
  try {
    const db = await openDB();
    const data = await new Promise((resolve) => {
      const t = db.transaction('tx','readonly');
      const req = t.objectStore('tx').getAll();
      req.onsuccess = () => resolve(req.result || []);
    });
    db.close();
    if (data.length === 0) {
      r.innerHTML = '<p class="info">还没有记录喵~</p>';
    } else {
      const sorted = data.sort((a,b) => b.createdAt - a.createdAt);
      r.innerHTML = '<p class="info">共 ' + data.length + ' 条记录：</p>' +
        sorted.slice(0,20).map(t =>
          '<div style="font-size:12px;padding:4px;text-align:left;border-bottom:1px solid #f5eef5">' +
          t.date + ' ' + (t.note||t.category) + ' -¥' + t.amount.toFixed(2) +
          '</div>'
        ).join('');
    }
  } catch(e) {
    r.innerHTML = '<p class="error">出错了喵：' + e.message + '</p>';
  }
}
// Auto-import on load
window.addEventListener('DOMContentLoaded', () => {
  importData();
});

</script>
</body>
</html>
